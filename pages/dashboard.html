<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - الاتحاد التجارية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #C4956A; border-radius: 10px; }
    .sidebar-link.active { background: #8B5E3C; color: white; }
    .sidebar-link:not(.active):hover { background: rgba(139,94,60,0.08); }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #8B5E3C; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" class="flex min-h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white border-l border-gray-200 flex flex-col fixed top-0 right-0 h-full z-40 transition-transform duration-300 translate-x-full lg:translate-x-0">
      <div class="p-6 border-b border-gray-100">
        <h1 class="text-lg font-bold text-[#2D2A26]">الاتحاد التجارية</h1>
        <p class="text-xs text-[#6B6560] mt-1">لوحة التحكم</p>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <button onclick="navigate('overview')" class="sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200" data-section="overview">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
          الرئيسية
        </button>
        <button onclick="navigate('messages')" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200" data-section="messages">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
          الرسائل
          <span id="unread-badge" class="hidden mr-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full"></span>
        </button>
        <button onclick="navigate('products')" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200" data-section="products">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
          المنتجات
        </button>
        <button onclick="navigate('gallery')" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200" data-section="gallery">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v13.5A1.5 1.5 0 003.75 21z"/></svg>
          المعرض
        </button>
        <button onclick="navigate('settings')" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200" data-section="settings">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          الإعدادات
        </button>
      </nav>
      <div class="p-4 border-t border-gray-100">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-[#8B5E3C]/10 flex items-center justify-center">
            <svg class="w-5 h-5 text-[#8B5E3C]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
          </div>
          <div>
            <p id="user-email" class="text-xs font-medium text-[#2D2A26] truncate max-w-[140px]"></p>
            <p class="text-[10px] text-[#6B6560]">مدير</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Mobile Sidebar Backdrop -->
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="hidden lg:hidden fixed inset-0 bg-black/40 z-30"></div>

    <!-- Main Content -->
    <main class="flex-1 lg:mr-64 flex flex-col min-h-screen">
      <!-- Top Navbar -->
      <header class="sticky top-0 z-20 h-16 bg-white/95 backdrop-blur-sm border-b border-gray-200 px-4 lg:px-8 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl border border-gray-200 text-[#2D2A26] hover:bg-gray-50 transition-colors" aria-label="القائمة">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
          </button>
          <div>
            <h1 class="text-sm lg:text-base font-bold text-[#2D2A26] leading-tight">الاتحاد التجارية</h1>
            <p class="text-[10px] text-[#6B6560]">لوحة التحكم</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span id="navbar-email" class="hidden sm:block text-xs text-[#6B6560]" dir="ltr"></span>
          <button onclick="logout()" class="flex items-center gap-2 px-3 lg:px-4 py-2 rounded-xl text-xs font-medium text-red-600 border border-red-100 hover:bg-red-50 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
            <span class="hidden sm:inline">تسجيل الخروج</span>
          </button>
        </div>
      </header>

      <div class="p-6 lg:p-8">
        <div id="content-area" class="max-w-6xl mx-auto"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay" onclick="if (event.target === this) closeModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-gray-100 flex items-center justify-between">
        <h3 id="modal-title" class="text-lg font-bold text-[#2D2A26]"></h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body" class="p-6"></div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-modal" class="fixed inset-0 z-[60] hidden items-center justify-center modal-overlay">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-6 text-center fade-in">
      <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L5.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
      </div>
      <h3 id="confirm-title" class="text-lg font-bold text-[#2D2A26] mb-2"></h3>
      <p id="confirm-text" class="text-sm text-[#6B6560] mb-6 leading-relaxed"></p>
      <div class="flex gap-3">
        <button id="confirm-cancel" class="flex-1 py-2.5 rounded-xl bg-gray-100 text-[#2D2A26] text-sm font-medium hover:bg-gray-200 transition-colors">إلغاء</button>
        <button id="confirm-ok" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white text-sm font-medium hover:bg-red-700 transition-colors"></button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-[70] hidden max-w-xs px-4 py-3 rounded-xl shadow-lg text-sm text-white fade-in"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://jupriobuhxpqwuotmzlc.supabase.co'
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1cHJpb2J1aHhwcXd1b3RtemxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTU2MTksImV4cCI6MjA5OTQzMTYxOX0.Yxcibr5oNO9CPGGdBXQYnaomnsgKfh-EMGQo3qOZGN0'
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON)

    // Auth check
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'login.html'; }
    else {
      document.getElementById('user-email').textContent = session.user.email;
      document.getElementById('navbar-email').textContent = session.user.email;
    }

    window.supabase = supabase
    window.currentSection = 'overview'
    window.logout = async () => { await supabase.auth.signOut(); window.location.href = 'login.html'; }
    const sidebar = document.getElementById('sidebar')
    const backdrop = document.getElementById('sidebar-backdrop')

    window.toggleSidebar = () => {
      sidebar.classList.toggle('translate-x-full')
      backdrop.classList.toggle('hidden')
    }

    function closeMobileSidebar() {
      sidebar.classList.add('translate-x-full')
      backdrop.classList.add('hidden')
    }

    // Navigation
    window.navigate = async (section) => {
      window.currentSection = section
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'))
      document.querySelector(`[data-section="${section}"]`).classList.add('active')
      closeMobileSidebar()
      await renderSection(section)
    }

    async function renderSection(section) {
      const content = document.getElementById('content-area')
      content.innerHTML = '<div class="flex items-center justify-center py-20"><div class="spinner"></div></div>'
      content.className = 'max-w-6xl mx-auto fade-in'

      switch(section) {
        case 'overview': await renderOverview(content); break
        case 'messages': await renderMessages(content); break
        case 'products': await renderProducts(content); break
        case 'gallery': await renderGallery(content); break
        case 'settings': renderSettings(content); break
      }
    }

    // OVERVIEW
    async function renderOverview(el) {
      const [msgRes, prodRes, galRes] = await Promise.all([
        supabase.from('messages').select('id, is_read', { count: 'exact' }),
        supabase.from('products').select('id, is_active', { count: 'exact' }),
        supabase.from('gallery_images').select('id', { count: 'exact' })
      ])
      const totalMsgs = msgRes.count || 0
      const unreadMsgs = (msgRes.data || []).filter(m => !m.is_read).length
      const totalProds = prodRes.count || 0
      const activeProds = (prodRes.data || []).filter(p => p.is_active).length
      const totalGallery = galRes.count || 0

      const { data: recentMsgs } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(5)

      el.innerHTML = `
        <div class="mb-8">
          <h2 class="text-2xl font-bold text-[#2D2A26]">مرحباً بك في لوحة التحكم</h2>
          <p class="text-[#6B6560] text-sm mt-1">نظرة عامة على نشاط الموقع</p>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center"><svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg></div>
              <span class="text-xs text-[#6B6560]">إجمالي الرسائل</span>
            </div>
            <p class="text-3xl font-bold text-[#2D2A26]">${totalMsgs}</p>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-red-50 flex items-center justify-center"><svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg></div>
              <span class="text-xs text-[#6B6560]">رسائل غير مقروءة</span>
            </div>
            <p class="text-3xl font-bold text-red-500">${unreadMsgs}</p>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-green-50 flex items-center justify-center"><svg class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg></div>
              <span class="text-xs text-[#6B6560]">إجمالي المنتجات</span>
            </div>
            <p class="text-3xl font-bold text-[#2D2A26]">${totalProds}</p>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-[#8B5E3C]/10 flex items-center justify-center"><svg class="w-5 h-5 text-[#8B5E3C]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
              <span class="text-xs text-[#6B6560]">منتجات نشطة</span>
            </div>
            <p class="text-3xl font-bold text-[#8B5E3C]">${activeProds}</p>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center"><svg class="w-5 h-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v13.5A1.5 1.5 0 003.75 21z"/></svg></div>
              <span class="text-xs text-[#6B6560]">صور المعرض</span>
            </div>
            <p class="text-3xl font-bold text-purple-600">${totalGallery}</p>
          </div>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div class="p-5 border-b border-gray-100 flex items-center justify-between">
            <h3 class="font-bold text-[#2D2A26]">آخر الرسائل الواردة</h3>
            <button onclick="navigate('messages')" class="text-xs text-[#8B5E3C] hover:underline">عرض الكل</button>
          </div>
          <div id="recent-messages" class="divide-y divide-gray-50">
            ${(!recentMsgs || recentMsgs.length === 0) ? '<p class="p-6 text-center text-sm text-gray-400">لا توجد رسائل بعد</p>' : ''}
          </div>
        </div>`

      if (recentMsgs && recentMsgs.length > 0) {
        const container = document.getElementById('recent-messages')
        recentMsgs.forEach(m => {
          container.innerHTML += `
            <div class="p-4 flex items-center gap-4 hover:bg-gray-50 cursor-pointer transition-colors ${!m.is_read ? 'bg-[#8B5E3C]/[0.03]' : ''}" onclick="viewMessage('${m.id}')">
              <div class="w-10 h-10 rounded-full bg-[#8B5E3C]/10 flex items-center justify-center flex-shrink-0">
                <span class="text-sm font-bold text-[#8B5E3C]">${m.name.charAt(0)}</span>
              </div>

        if (data) showMsgModal(data)
      } else {
        showMsgModal(msg)

          await supabase.from('messages').update({ is_read: true }).eq('id', id)
          msg.is_read = true
          const badge = document.getElementById('unread-badge')
          const unread = window.allMessages.filter(m => !m.is_read).length

    window.deleteMessage = async (id) => {
      if (!(await showConfirm({ title: 'حذف الرسالة', text: 'هل أنت متأكد من حذف هذه الرسالة؟ لا يمكن التراجع عن هذا الإجراء.' }))) return
      await supabase.from('messages').delete().eq('id', id)
      closeModal()
      if (window.currentSection === 'messages') await renderMessages(document.getElementById('content-area'))
      else if (window.currentSection === 'overview') await renderOverview(document.getElementById('content-area'))
    }

    window.closeModal = () => {
      document.getElementById('modal').classList.add('hidden')
      document.getElementById('modal').classList.remove('flex')
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return
      // the confirm dialog handles its own Escape; don't close the modal underneath it
      if (!document.getElementById('confirm-modal').classList.contains('hidden')) return
      if (!document.getElementById('modal').classList.contains('hidden')) closeModal()
    })

    // Pretty confirm dialog (replaces window.confirm)
    window.showConfirm = ({ title = 'تأكيد الحذف', text = '', confirmLabel = 'حذف' } = {}) => new Promise((resolve) => {
      const m = document.getElementById('confirm-modal')
      const okBtn = document.getElementById('confirm-ok')
      const cancelBtn = document.getElementById('confirm-cancel')
      document.getElementById('confirm-title').textContent = title
      document.getElementById('confirm-text').textContent = text
      okBtn.textContent = confirmLabel
      m.classList.remove('hidden')
      m.classList.add('flex')

      const close = (result) => {
        m.classList.add('hidden')
        m.classList.remove('flex')
        okBtn.removeEventListener('click', onOk)
        cancelBtn.removeEventListener('click', onCancel)
        m.removeEventListener('click', onOverlay)
        document.removeEventListener('keydown', onKey)
        resolve(result)
      }
      const onOk = () => close(true)
      const onCancel = () => close(false)
      const onOverlay = (e) => { if (e.target === m) close(false) }
      const onKey = (e) => { if (e.key === 'Escape') close(false) }

      okBtn.addEventListener('click', onOk)
      cancelBtn.addEventListener('click', onCancel)
      m.addEventListener('click', onOverlay)
      document.addEventListener('keydown', onKey)
    })

    // Toast notification (replaces window.alert)
    let toastTimer = null

      const t = document.getElementById('toast')
      t.textContent = msg

      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => t.classList.add('hidden'), 3500)
    }

    window.showProductForm = (product = null) => {
      const isEdit = !!product
      document.getElementById('modal-title').textContent = isEdit ? 'تعديل المنتج' : 'إضافة منتج جديد'
      document.getElementById('modal-body').innerHTML = `
        <form id="product-form" class="space-y-4">
          <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">اسم المنتج (عربي) *</label><input id="p-name-ar" required value="${isEdit ? product.name_ar : ''}" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
          <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">اسم المنتج (إنجليزي)</label><input id="p-name-en" value="${isEdit && product.name_en ? product.name_en : ''}" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
          <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">الوصف (عربي)</label><textarea id="p-desc-ar" rows="3" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none resize-none">${isEdit && product.desc_ar ? product.desc_ar : ''}</textarea></div>
          <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">الوصف (إنجليزي)</label><textarea id="p-desc-en" rows="3" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none resize-none">${isEdit && product.desc_en ? product.desc_en : ''}</textarea></div>

      let selectedFile = null
      let existingImageUrl = isEdit ? product.image_url : null

      const fileInput = document.getElementById('p-image-file')
      const placeholder = document.getElementById('upload-placeholder')
      const preview = document.getElementById('upload-preview')
      const previewImg = document.getElementById('preview-img')
      const previewName = document.getElementById('preview-name')

      if (isEdit && product.image_url) {
        previewImg.src = product.image_url
        previewName.textContent = 'الصورة الحالية'
        placeholder.classList.add('hidden')
        preview.classList.remove('hidden')
      }

        selectedFile = e.target.files[0]
        if (!selectedFile) return
        if (selectedFile.size > 5 * 1024 * 1024) { showToast('الصورة كبيرة جداً. الحد الأقصى 5MB'); return }
        const reader = new FileReader()
        reader.onload = (ev) => {
          previewImg.src = ev.target.result
          previewName.textContent = selectedFile.name
          placeholder.classList.add('hidden')
          preview.classList.remove('hidden')
        }
        reader.readAsDataURL(selectedFile)
      })

        fileInput.value = ''
        placeholder.classList.remove('hidden')
        preview.classList.add('hidden')

          const ext = selectedFile.name.split('.').pop()
          const fileName = `products/${Date.now()}-${Math.random().toString(36).substr(2,9)}.${ext}`

        await renderProducts(document.getElementById('content-area'))

                  </div>
                  <div class="flex items-center gap-2">
                    <span class="px-2 py-0.5 rounded-full text-[10px] font-medium ${p.is_active ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-400'}">${p.is_active ? 'نشط' : 'غير نشط'}</span>
                    <span class="px-2 py-0.5 rounded-full text-[10px] font-medium bg-blue-50 text-blue-600">${p.category || 'general'}</span>
                  </div>
                </div>
                <div class="flex gap-2 mt-3">
                  <button onclick='editGalleryImage(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="flex-1 text-center py-2 rounded-lg bg-gray-50 text-[#2D2A26] text-xs font-medium hover:bg-gray-100 transition-colors">تعديل</button>
                  <button onclick="deleteGalleryImage('${p.id}')" class="px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs font-medium hover:bg-red-100 transition-colors">حذف</button>
                </div>
              </div>
            </div>`
        })
      }
    }

    window.showGalleryForm = (image = null) => {
      const isEdit = !!image
      document.getElementById('modal-title').textContent = isEdit ? 'تعديل الصورة' : 'إضافة صورة جديدة'
      document.getElementById('modal-body').innerHTML = `
        <form id="gallery-form" class="space-y-4">
          <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">العنوان (عربي) *</label><input id="g-title-ar" required value="${isEdit ? image.title_ar : ''}" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
          <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">العنوان (إنجليزي)</label><input id="g-title-en" value="${isEdit && image.title_en ? image.title_en : ''}" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
          <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">الوصف (عربي)</label><textarea id="g-desc-ar" rows="2" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none resize-none">${isEdit && image.description_ar ? image.description_ar : ''}</textarea></div>
          <div>
            <label class="block text-xs font-medium text-[#2D2A26] mb-1">الصورة *</label>
            <div id="g-upload-area" class="relative border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:border-[#8B5E3C] transition-colors cursor-pointer">
              <input type="file" id="g-image-file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
              <div id="g-upload-placeholder">
                <svg class="w-8 h-8 mx-auto text-gray-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v13.5A1.5 1.5 0 003.75 21z"/></svg>
                <p class="text-xs text-gray-400">اضغط لاختيار صورة من المعرض</p>
                <p class="text-[10px] text-gray-300 mt-1">PNG, JPG, WEBP - حد أقصى 5MB</p>
              </div>
              <div id="g-upload-preview" class="hidden">
                <img id="g-preview-img" class="w-32 h-32 object-cover rounded-lg mx-auto mb-2">
                <p id="g-preview-name" class="text-xs text-[#2D2A26] truncate max-w-[200px] mx-auto"></p>
                <button type="button" id="g-remove-image" class="mt-2 text-xs text-red-500 hover:text-red-700">إزالة الصورة</button>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">التصنيف</label><input id="g-category" value="${isEdit ? image.category : 'general'}" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
            <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">الترتيب</label><input id="g-sort" type="number" value="${isEdit ? image.sort_order : 0}" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
          </div>
          <div class="flex items-center gap-2">
            <input type="checkbox" id="g-active" ${!isEdit || image.is_active ? 'checked' : ''} class="w-4 h-4 rounded text-[#8B5E3C] focus:ring-[#8B5E3C]">
            <label for="g-active" class="text-xs text-[#2D2A26]">صورة نشطة</label>
          </div>
          <button type="submit" id="gallery-submit-btn" class="w-full py-2.5 rounded-xl bg-[#8B5E3C] text-white text-sm font-medium hover:bg-[#6B4423] transition-colors">${isEdit ? 'حفظ التعديلات' : 'إضافة الصورة'}</button>
        </form>`

      let selectedFile = null
      let existingImageUrl = isEdit ? image.image_url : null

      const fileInput = document.getElementById('g-image-file')
      const placeholder = document.getElementById('g-upload-placeholder')
      const preview = document.getElementById('g-upload-preview')
      const previewImg = document.getElementById('g-preview-img')
      const previewName = document.getElementById('g-preview-name')

      if (isEdit && image.image_url) {
        previewImg.src = image.image_url
        previewName.textContent = 'الصورة الحالية'
        placeholder.classList.add('hidden')
        preview.classList.remove('hidden')
      }

      fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0]
        if (!selectedFile) return
        if (selectedFile.size > 5 * 1024 * 1024) { showToast('الصورة كبيرة جداً. الحد الأقصى 5MB'); return }
        const reader = new FileReader()
        reader.onload = (ev) => {
          previewImg.src = ev.target.result
          previewName.textContent = selectedFile.name
          placeholder.classList.add('hidden')
          preview.classList.remove('hidden')
        }
        reader.readAsDataURL(selectedFile)
      })

      document.getElementById('g-remove-image')?.addEventListener('click', () => {
        selectedFile = null
        existingImageUrl = null
        fileInput.value = ''
        placeholder.classList.remove('hidden')
        preview.classList.add('hidden')
      })

      document.getElementById('gallery-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const btn = document.getElementById('gallery-submit-btn')
        btn.disabled = true
        btn.textContent = 'جاري الحفظ...'

        let imageUrl = existingImageUrl

        if (selectedFile) {
          btn.textContent = 'جاري رفع الصورة...'
          const ext = selectedFile.name.split('.').pop()
          const fileName = `gallery/${Date.now()}-${Math.random().toString(36).substr(2,9)}.${ext}`
          const { error: uploadError } = await supabase.storage.from('product-images').upload(fileName, selectedFile)
          if (uploadError) {
            showToast('خطأ في رفع الصورة: ' + uploadError.message)
            btn.disabled = false
            btn.textContent = isEdit ? 'حفظ التعديلات' : 'إضافة الصورة'
            return
          }
          const { data: urlData } = supabase.storage.from('product-images').getPublicUrl(fileName)
          imageUrl = urlData.publicUrl
        }

        if (!imageUrl) { showToast('يجب اختيار صورة'); btn.disabled = false; btn.textContent = isEdit ? 'حفظ التعديلات' : 'إضافة الصورة'; return }

        const data = {
          title_ar: document.getElementById('g-title-ar').value,
          title_en: document.getElementById('g-title-en').value || null,
          description_ar: document.getElementById('g-desc-ar').value || null,
          image_url: imageUrl,
          category: document.getElementById('g-category').value || 'general',
          sort_order: parseInt(document.getElementById('g-sort').value) || 0,
          is_active: document.getElementById('g-active').checked
        }
        if (isEdit) { await supabase.from('gallery_images').update(data).eq('id', image.id) }
        else { await supabase.from('gallery_images').insert(data) }
        closeModal()
        await renderGallery(document.getElementById('content-area'))
      })

      document.getElementById('modal').classList.remove('hidden')
      document.getElementById('modal').classList.add('flex')
    }

    window.editGalleryImage = (image) => { showGalleryForm(image) }

    window.deleteGalleryImage = async (id) => {
      if (!(await showConfirm({ title: 'حذف الصورة', text: 'هل أنت متأكد من حذف هذه الصورة؟ لا يمكن التراجع عن هذا الإجراء.' }))) return
      await supabase.from('gallery_images').delete().eq('id', id)
      await renderGallery(document.getElementById('content-area'))
    }

    // SETTINGS
    function renderSettings(el) {
      el.innerHTML = `
        <div class="mb-8">
          <h2 class="text-2xl font-bold text-[#2D2A26]">الإعدادات</h2>
          <p class="text-[#6B6560] text-sm mt-1">إدارة حسابك</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 max-w-lg">
          <h3 class="font-bold text-[#2D2A26] mb-4">تغيير كلمة المرور</h3>
          <div id="settings-msg" class="hidden mb-4 p-3 rounded-xl text-sm text-center"></div>
          <form id="pw-form" class="space-y-4">
            <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">كلمة المرور الجديدة</label><input id="new-pw" type="password" required minlength="6" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
            <div><label class="block text-xs font-medium text-[#2D2A26] mb-1">تأكيد كلمة المرور</label><input id="confirm-pw" type="password" required minlength="6" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-[#8B5E3C] focus:ring-2 focus:ring-[#8B5E3C]/10 outline-none"></div>
            <button type="submit" class="w-full py-2.5 rounded-xl bg-[#8B5E3C] text-white text-sm font-medium hover:bg-[#6B4423] transition-colors">تحديث كلمة المرور</button>
          </form>
        </div>`

      document.getElementById('pw-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const msg = document.getElementById('settings-msg')
        const pw = document.getElementById('new-pw').value
        const cpw = document.getElementById('confirm-pw').value
        if (pw !== cpw) {
          msg.className = 'mb-4 p-3 rounded-xl bg-red-50 text-red-600 text-sm text-center'
          msg.textContent = 'كلمتا المرور غير متطابقتين'
          msg.classList.remove('hidden')
          return
        }
        const { error } = await supabase.auth.updateUser({ password: pw })
        if (error) {
          msg.className = 'mb-4 p-3 rounded-xl bg-red-50 text-red-600 text-sm text-center'
          msg.textContent = error.message
          msg.classList.remove('hidden')
        } else {
          msg.className = 'mb-4 p-3 rounded-xl bg-green-50 text-green-600 text-sm text-center'
          msg.textContent = 'تم تحديث كلمة المرور بنجاح'
          msg.classList.remove('hidden')
          document.getElementById('pw-form').reset()
        }
      })
    }

    // Unread badge
    async function updateUnreadBadge() {
      const { data } = await supabase.from('messages').select('id').eq('is_read', false)
      const badge = document.getElementById('unread-badge')
      if (data && data.length > 0) { badge.textContent = data.length; badge.classList.remove('hidden') }
      else { badge.classList.add('hidden') }
    }

    // Init
    await renderSection('overview')
    await updateUnreadBadge()

    // Realtime messages
    supabase.channel('messages-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
      updateUnreadBadge()
      if (window.currentSection === 'overview') renderOverview(document.getElementById('content-area'))
      if (window.currentSection === 'messages') renderMessages(document.getElementById('content-area'))
    }).subscribe()
  </script>
</body>
</html>
