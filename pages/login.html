<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - لوحة التحكم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    .login-bg {
      background: linear-gradient(135deg, #2D2A26 0%, #4A3728 50%, #8B5E3C 100%);
    }
    .glass-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
    }
    .input-focus:focus {
      border-color: #8B5E3C;
      box-shadow: 0 0 0 3px rgba(139,94,60,0.15);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.6s ease-out forwards; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #8B5E3C; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md animate-in">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white mb-2">الاتحاد التجارية</h1>
      <p class="text-white/60 text-sm">لوحة التحكم - تسجيل الدخول</p>
    </div>

    <div class="glass-card rounded-3xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-[#8B5E3C]/10 flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-[#8B5E3C]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-[#2D2A26]">مرحباً بك</h2>
        <p class="text-[#6B6560] text-sm mt-1">سجّل الدخول للوصول إلى لوحة التحكم</p>
      </div>

      <div id="error-msg" class="hidden mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm text-center"></div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-[#2D2A26] mb-2">البريد الإلكتروني</label>
          <input type="email" id="email" required placeholder="admin@gmail.com"
            class="w-full px-4 py-3 rounded-xl border border-[#e8e0d6] bg-white text-[#2D2A26] input-focus transition-all duration-200 outline-none text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-[#2D2A26] mb-2">كلمة المرور</label>
          <div class="relative">
            <input type="password" id="password" required placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl border border-[#e8e0d6] bg-white text-[#2D2A26] input-focus transition-all duration-200 outline-none text-sm pl-12">
            <button type="button" id="toggle-pass" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6B6560] hover:text-[#8B5E3C] transition-colors">
              <svg id="eye-open" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <svg id="eye-closed" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" id="login-btn"
          class="w-full py-3 rounded-xl bg-[#8B5E3C] text-white font-bold text-sm hover:bg-[#6B4423] transition-all duration-300 hover:shadow-lg flex items-center justify-center gap-2">
          <span id="login-text">تسجيل الدخول</span>
          <div id="login-spinner" class="hidden spinner"></div>
        </button>
      </form>
    </div>

    <p class="text-center text-white/40 text-xs mt-6">© 2026 شركة الاتحاد التجارية - جميع الحقوق محفوظة</p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://jupriobuhxpqwuotmzlc.supabase.co'
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1cHJpb2J1aHhwcXd1b3RtemxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTU2MTksImV4cCI6MjA5OTQzMTYxOX0.Yxcibr5oNO9CPGGdBXQYnaomnsgKfh-EMGQo3qOZGN0'
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON)

    const form = document.getElementById('login-form')
    const errorMsg = document.getElementById('error-msg')
    const loginBtn = document.getElementById('login-btn')
    const loginText = document.getElementById('login-text')
    const loginSpinner = document.getElementById('login-spinner')

    const { data: { session } } = await supabase.auth.getSession()
    if (session) { window.location.href = 'dashboard.html'; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errorMsg.classList.add('hidden')
      loginBtn.disabled = true
      loginText.classList.add('hidden')
      loginSpinner.classList.remove('hidden')

      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      const { data, error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        errorMsg.textContent = error.message === 'Invalid login credentials' ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة' : error.message
        errorMsg.classList.remove('hidden')
        loginBtn.disabled = false
        loginText.classList.remove('hidden')
        loginSpinner.classList.add('hidden')
        return
      }

      window.location.href = 'dashboard.html'
    })

    document.getElementById('toggle-pass').addEventListener('click', () => {
      const input = document.getElementById('password')
      const open = document.getElementById('eye-open')
      const closed = document.getElementById('eye-closed')
      if (input.type === 'password') { input.type = 'text'; open.classList.add('hidden'); closed.classList.remove('hidden'); }
      else { input.type = 'password'; open.classList.remove('hidden'); closed.classList.add('hidden'); }
    })
  </script>
</body>
</html>
